server:
  port: 9090

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # DB already exists not exist
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}